    <filter id="shadow" x="110" y="70" width="1380" height="840" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#503321" flood-opacity="0.16"/>

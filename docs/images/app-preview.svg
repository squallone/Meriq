<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="180" y1="120" x2="1440" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6EEE2"/>
